stages:
  data_processing:
    cmd: python src/data/data_processing.py
    deps:
    - data/raw
    - src/data/data_processing.py
    outs:
    - data/processed
  data_features:
    cmd: python src/features/features.py
    deps:
    - data/processed
    - src/features/features.py
    outs:
    - data/interim
  model_building:
    cmd: python src/model/model_building.py
    deps:
    - data/interim
    - src/model/model_building.py
    params:
    - data_spliting
    - optuna
    - final_model
    outs:
    - models
  model_evaluation:
    cmd: python src/model/model_evaluation.py
    deps:
    - data/external/test_data.csv
    - models/model.pkl
    - src/model/model_evaluation.py
    metrics:
    - reports/metrics.json
